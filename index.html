<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#B82122" />
    <title>Dimsum MaQueen 🥟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- ✅ FIX 1: Tag <link> hanya berisi atribut href dan rel, TIDAK ada CSS di dalamnya -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════════════
       RESET & ROOT
    ═══════════════════════════════════════════════════ */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      :root {
        --red: #b82122;
        --yellow: #ffc107;
        --cream: #fdf8f0;
        --dark: #1a1a1a;
        --green: #25d366;
        --white: #fff;
        --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.07);
        --shadow-cart: 0 -4px 30px rgba(184, 33, 34, 0.22);
      }
      html,
      body {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: var(--cream);
        -webkit-font-smoothing: antialiased;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
      }
      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }
      input[type='number']::-webkit-inner-spin-button,
      input[type='number']::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-7px);
        }
        40%,
        80% {
          transform: translateX(7px);
        }
      }
      @keyframes badgePop {
        from {
          transform: scale(0) rotate(-12deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }
      @keyframes qtyBump {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.45);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes wobble {
        0% {
          transform: rotate(0) scale(1);
        }
        18% {
          transform: rotate(-8deg) scale(1.12);
        }
        36% {
          transform: rotate(6deg) scale(1.08);
        }
        54% {
          transform: rotate(-4deg) scale(1.05);
        }
        72% {
          transform: rotate(2deg) scale(1.02);
        }
        100% {
          transform: rotate(0) scale(1);
        }
      }
      @keyframes ripple {
        to {
          transform: scale(2.5);
          opacity: 0;
        }
      }
      @keyframes floatMascot {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* ═══════════════════════════════════════════════════
       WELCOME POPUP — NPC Style
       Bubble dialog kiri + Maskot besar kanan
    ═══════════════════════════════════════════════════ */
      .welcome-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        z-index: 100;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .welcome-overlay.show {
        opacity: 1;
        pointer-events: all;
      }

      /* Container: seluruh popup, slide naik dari bawah */
      .welcome-container {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        /* Tidak ada padding — maskot mepet tepi kanan */
        transform: translateY(140px);
        transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .welcome-overlay.show .welcome-container {
        transform: translateY(0);
      }

      /* ── BUBBLE — compact, lebar terbatas ── */
      .welcome-bubble {
        /* Lebar fixed, bukan flex — supaya tidak makan terlalu banyak ruang */
        width: 195px;
        flex-shrink: 0;
        background: #fff;
        border-radius: 16px 16px 16px 4px;
        padding: 13px 14px 14px;
        margin: 0 0 44px 14px;
        box-shadow: 0 10px 32px rgba(0, 0, 0, 0.22),
          0 2px 6px rgba(0, 0, 0, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.95);
        position: relative;
        opacity: 0;
        transform: translateY(14px) scale(0.93);
        transform-origin: bottom left;
        transition: opacity 0.4s ease 0.28s,
          transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.28s;
      }
      .welcome-overlay.show .welcome-bubble {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      /* Ekor bubble menunjuk ke kanan-bawah arah maskot */
      .welcome-bubble::after {
        content: '';
        position: absolute;
        bottom: -13px;
        right: -1px;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 13px 0 0 15px;
        border-color: transparent transparent transparent #fff;
      }

      /* Name tag */
      .welcome-nametag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--red);
        color: #fff;
        font-family: 'Sora', sans-serif;
        font-size: 9px;
        font-weight: 800;
        padding: 3px 8px;
        border-radius: 20px;
        margin-bottom: 8px;
        box-shadow: 0 2px 8px rgba(184, 33, 34, 0.3);
      }
      .welcome-nametag::before {
        content: '💬 ';
      }

      .welcome-bubble p {
        /* Lebih kecil supaya tidak makan ruang */
        font-size: 12px;
        color: var(--dark);
        line-height: 1.55;
        font-family: 'Sora', sans-serif;
        font-weight: 600;
        margin-bottom: 11px;
      }
      .welcome-bubble strong {
        color: var(--red);
        font-weight: 800;
      }

      /* ── MASKOT — mengambil sisa ruang, BESAR ── */
      .welcome-mascot {
        /* flex:1 supaya maskot mengisi sisa ruang setelah bubble */
        flex: 1;
        min-width: 0;
        align-self: flex-end;
        position: relative;
        z-index: 2;
        margin-bottom: 0;
        opacity: 0;
        transform: translateY(40px) scale(0.88);
        transition: opacity 0.5s ease 0.08s,
          transform 0.58s cubic-bezier(0.34, 1.56, 0.64, 1) 0.08s;
      }
      .welcome-overlay.show .welcome-mascot {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      /* Gambar maskot — penuh lebar container-nya */
      .welcome-mascot img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
        filter: drop-shadow(-6px 0 16px rgba(0, 0, 0, 0.35))
          drop-shadow(0 12px 22px rgba(0, 0, 0, 0.2));
        animation: floatMascot 3.5s ease-in-out infinite;
      }

      /* Fallback emoji */
      .welcome-mascot-fallback {
        width: 100%;
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 120px;
        animation: floatMascot 3.5s ease-in-out infinite;
      }

      /* Tombol */
      .btn-welcome {
        width: 100%;
        background: var(--red);
        color: #fff;
        border: none;
        padding: 11px 12px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 12px;
        font-family: 'Sora', sans-serif;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(184, 33, 34, 0.35);
        transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @media (hover: hover) {
        .btn-welcome:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 20px rgba(184, 33, 34, 0.45);
        }
      }
      .btn-welcome:active {
        transform: scale(0.95);
      }

      /* ═══════════════════════════════════════════════════
       PAGES & HERO
    ═══════════════════════════════════════════════════ */
      .page {
        display: none;
        min-height: 100vh;
        background: var(--cream);
        flex-direction: column;
      }
      .page.active {
        display: flex;
      }

      .hero {
        background: var(--red);
        color: #fff;
        padding: 40px 20px 56px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        text-align: center;
      }
      .hero::before {
        content: '';
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        top: -60px;
        right: -60px;
        pointer-events: none;
      }
      .hero::after {
        content: '';
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: rgba(255, 193, 7, 0.12);
        bottom: -40px;
        left: -40px;
        pointer-events: none;
      }
      .hero-logo-wrap {
        position: relative;
        z-index: 1;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 3px solid rgba(255, 255, 255, 0.3);
        overflow: hidden;
        margin: 0 auto 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
      }
      .hero-logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hero-title {
        font-family: 'Sora', sans-serif;
        font-size: 26px;
        font-weight: 900;
        line-height: 1.15;
        position: relative;
        z-index: 1;
      }
      .hero-subtitle {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
        margin-top: 6px;
        position: relative;
        z-index: 1;
      }

      /* ═══════════════════════════════════════════════════
       SEARCH & TABS
    ═══════════════════════════════════════════════════ */
      .search-wrap {
        padding: 0 16px;
        margin-top: -22px;
        position: relative;
        z-index: 10;
        margin-bottom: 0;
      }
      .search-wrap .s-icon {
        position: absolute;
        left: 28px;
        top: 50%;
        transform: translateY(-50%);
        color: #aaa;
        pointer-events: none;
      }
      .search-wrap .s-icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }
      .search-wrap input {
        width: 100%;
        background: #fff;
        border: none;
        border-radius: 18px;
        padding: 13px 16px 13px 42px;
        font-size: 13px;
        outline: none;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.09);
        color: var(--dark);
      }
      .search-wrap input::placeholder {
        color: #bbb;
      }

      .cat-tabs-wrap {
        padding: 14px 16px 4px;
        overflow-x: auto;
        display: flex;
        gap: 8px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .cat-tabs-wrap::-webkit-scrollbar {
        display: none;
      }

      /* ✅ FIX 3: Deklarasi .cat-pill digabung menjadi SATU blok — tidak ada duplikasi */
      .cat-pill {
        white-space: nowrap;
        flex-shrink: 0;
        padding: 7px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        border: 1.5px solid #e0d8ce;
        background: #fff;
        color: #888;
        cursor: pointer;
        font-family: 'Sora', sans-serif;
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cat-pill:hover {
        border-color: var(--red);
        color: var(--red);
        transform: translateY(-2px);
      }
      .cat-pill.active {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
        transform: scale(1.05);
        box-shadow: 0 4px 10px rgba(184, 33, 34, 0.2);
      }
      .cat-pill:active {
        transform: scale(0.92);
      }

      /* ═══════════════════════════════════════════════════
       GRID & CARD
    ═══════════════════════════════════════════════════ */
      .cat-section {
        padding: 0 16px;
        margin-bottom: 16px;
      }
      .cat-section-title {
        font-family: 'Sora', sans-serif;
        font-size: 20px;
        font-weight: 800;
        margin: 24px 0 14px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .cat-section-title span {
        font-size: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .grid-all {
        padding: 0 16px 140px;
      }

      .card {
        background: #fff;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow-card);
        display: flex;
        flex-direction: column;
        cursor: pointer;
        opacity: 0;
        transform: translateY(30px) scale(0.94);
        transition: opacity 0.52s cubic-bezier(0.22, 0.68, 0, 1.2),
          transform 0.52s cubic-bezier(0.22, 0.68, 0, 1.2), box-shadow 0.2s;
        will-change: transform, opacity;
      }
      .card.revealed {
        opacity: 1;
        transform: none;
      }

      /* Featured card */
      .card.featured {
        grid-column: span 2;
        display: flex;
        flex-direction: column;
        background: #fff;
        border: 2px solid var(--red);
        box-shadow: 0 8px 30px rgba(184, 33, 34, 0.18);
        border-radius: 18px;
        overflow: hidden;
      }
      .card.featured .card-img {
        width: 100%;
        padding-top: 100%;
        border-right: none;
        border-bottom: 2px solid #f8f4ee;
      }
      .card.featured .card-body {
        padding: 18px 18px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 6px;
      }
      .card.featured .card-name {
        font-size: 18px;
        font-weight: 900;
        line-height: 1.3;
      }
      .card.featured .price-main {
        font-size: 20px;
        margin-top: 4px;
      }
      .card.featured .card-footer {
        padding: 8px 18px 20px;
        width: 100%;
      }
      .card.featured .btn-add {
        padding: 13px 6px;
        font-size: 14px;
      }
      .card.featured .badge-featured {
        top: 12px;
        right: 12px;
        font-size: 11px;
        padding: 6px 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .card.featured .badge-promo {
        top: 12px;
        left: 12px;
        font-size: 11px;
        padding: 6px 12px;
      }

      @media (hover: hover) {
        .card:hover {
          transform: translateY(-4px) scale(1.025);
          box-shadow: 0 14px 34px rgba(184, 33, 34, 0.15),
            0 4px 12px rgba(0, 0, 0, 0.06);
        }
        .card:hover .card-img img {
          transform: scale(1.07);
        }
        .card:hover .emoji-fallback {
          animation: wobble 0.5s ease;
        }
      }
      .card:active {
        transform: scale(0.95) !important;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1) !important;
        transition: transform 0.08s, box-shadow 0.08s !important;
      }

      .card-img {
        position: relative;
        width: 100%;
        padding-top: 100%;
        overflow: hidden;
        background: #f9f5ee;
      }
      .card-img img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .emoji-fallback {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
      }

      .badge-promo {
        position: absolute;
        top: 8px;
        left: 8px;
        background: var(--red);
        color: #fff;
        font-size: 9px;
        font-weight: 800;
        padding: 3px 8px;
        border-radius: 20px;
        font-family: 'Sora', sans-serif;
        animation: badgePop 0.4s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .badge-featured {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--yellow);
        color: #1a1a1a;
        font-size: 9px;
        font-weight: 800;
        padding: 3px 8px;
        border-radius: 20px;
        font-family: 'Sora', sans-serif;
      }
      .badge-var {
        position: absolute;
        bottom: 7px;
        right: 7px;
        background: rgba(0, 0, 0, 0.62);
        color: #fff;
        font-size: 9px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 20px;
      }

      .card-body {
        padding: 10px 11px 4px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .card-name {
        font-size: 12px;
        font-weight: 700;
        color: var(--dark);
        line-height: 1.35;
        font-family: 'Sora', sans-serif;
      }
      .price-original {
        font-size: 10px;
        color: #bbb;
        text-decoration: line-through;
        line-height: 1.2;
      }
      .price-main {
        font-size: 14px;
        font-weight: 800;
        color: var(--dark);
        font-family: 'Sora', sans-serif;
        line-height: 1.2;
      }
      .price-main.promo {
        color: var(--red);
      }
      .card-footer {
        padding: 8px 10px 10px;
      }

      /* ✅ FIX 4: Deklarasi .btn-add digabung menjadi SATU blok yang bersih */
      .btn-add {
        width: 100%;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 11px;
        padding: 10px 6px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        font-family: 'Sora', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 12px rgba(184, 33, 34, 0.2);
      }
      @media (hover: hover) {
        .btn-add:hover {
          transform: translateY(-3px) scale(1.03);
          background: #d12127;
          box-shadow: 0 8px 20px rgba(184, 33, 34, 0.4);
        }
      }
      .btn-add:active {
        transform: translateY(1px) scale(0.93) !important;
        background: #8c1819;
        box-shadow: 0 2px 6px rgba(184, 33, 34, 0.3) !important;
        transition: all 0.1s ease !important;
      }
      .btn-add::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.3);
        transform: scale(0);
        border-radius: inherit;
        pointer-events: none;
      }
      .btn-add:active::after {
        animation: ripple 0.4s ease;
      }

      .qty-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .btn-qty {
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .btn-qty:active {
        transform: scale(0.85) !important;
      }
      .btn-minus {
        background: #fff0f0;
        color: var(--red);
      }
      .btn-plus {
        background: var(--red);
        color: #fff;
      }
      .qty-num {
        font-size: 20px;
        font-weight: 900;
        color: var(--dark);
        font-family: 'Sora', sans-serif;
        min-width: 22px;
        text-align: center;
      }
      .qty-num.bump {
        animation: qtyBump 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* ═══════════════════════════════════════════════════
       STICKY CART & BOTTOM NAV
    ═══════════════════════════════════════════════════ */
      .sticky-cart {
        position: fixed;
        bottom: 68px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 480px;
        padding: 0 16px 18px;
        z-index: 50;
        pointer-events: none;
        transition: opacity 0.3s,
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .sticky-cart.hidden {
        opacity: 0;
        transform: translateX(-50%) translateY(80px);
      }
      .cart-btn {
        pointer-events: all;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 18px;
        padding: 14px 18px;
        cursor: pointer;
        box-shadow: var(--shadow-cart);
        transition: transform 0.12s;
      }
      .cart-btn:active {
        transform: scale(0.97);
      }
      .cart-icon-wrap {
        position: relative;
      }
      .cart-badge {
        position: absolute;
        top: -8px;
        right: -9px;
        background: var(--yellow);
        color: #1a1a1a;
        font-size: 9px;
        font-weight: 800;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Sora', sans-serif;
      }
      .cart-badge.pop {
        animation: badgePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cart-label {
        flex: 1;
        text-align: left;
        font-size: 13px;
        font-weight: 700;
        font-family: 'Sora', sans-serif;
      }
      .cart-total {
        font-size: 13px;
        font-weight: 800;

        left: 50%;

      /* ═══════════════════════════════════════════════════
       BACKDROP & SHEETS
    ═══════════════════════════════════════════════════ */
      .backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.52);
        z-index: 60;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s;
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
      }
      .backdrop.show {
        opacity: 1;
        pointer-events: all;
      }
      .sheet {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 100%;
        max-width: 480px;
        background: var(--cream);
        border-radius: 26px 26px 0 0;
        z-index: 70;
        max-height: 94vh;
        display: flex;
        flex-direction: column;
        transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      }
      .sheet.show {
        transform: translateX(-50%) translateY(0);
      }
      .sheet-handle {
        display: flex;
        justify-content: center;
        padding: 13px 0 5px;
      }
      .handle {
        width: 42px;
        height: 4px;
        background: #ddd;
        border-radius: 2px;
      }
      .sheet-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 20px 14px;
        border-bottom: 1px solid #ede8de;
      }
      .sheet-title {
        font-size: 17px;
        font-weight: 800;
        color: var(--dark);
        font-family: 'Sora', sans-serif;
      }
      .btn-close {
        width: 32px;
        height: 32px;
        background: #ede8de;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: #888;
      }
      .sheet-body {
        overflow-y: auto;
        flex: 1;
        padding: 18px 20px 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .admin-row {

      /* ═══════════════════════════════════════════════════
       IMAGE UPLOAD ZONE
    ═══════════════════════════════════════════════════ */
      .img-zone {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        border: 2px dashed #e0d8ce;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        background: #faf7f2;
        transition: border-color 0.2s, background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .img-zone:hover {
        border-color: var(--red);
        background: #fff9f9;
      }
      .img-zone.has-img {
        border-style: solid;
        border-color: #f0e0e0;
      }
      .img-zone-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: #ccc;
        pointer-events: none;
        padding: 16px;
        text-align: center;
      }
      .img-zone-placeholder svg {
        width: 34px;
        height: 34px;
      }
      .img-zone-placeholder strong {
        font-size: 13px;
        color: #bbb;
        font-weight: 600;
      }
      .img-zone-preview {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }
      .img-zone-preview.on {
        display: block;
      }
      .img-zone-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }
      .img-zone.has-img:hover .img-zone-overlay {
        display: flex;
      }
      .img-remove {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 3;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.55);
        border: none;
        color: #fff;
        cursor: pointer;
        font-size: 15px;
        display: none;
        align-items: center;
        justify-content: center;
        line-height: 1;
        transition: background 0.15s;
      }
      .img-zone.has-img .img-remove {
        display: flex;
      }
      .img-remove:hover {
        background: rgba(200, 0, 0, 0.7);
      }
      .compress-progress {
        margin-top: 6px;
        display: none;
      }
      .compress-progress.on {
        display: block;
      }
      .compress-track {
        width: 100%;
        height: 5px;
        background: #ede8de;
        border-radius: 3px;
        overflow: hidden;
      }
      .compress-fill {
        height: 100%;
        background: var(--red);
        border-radius: 3px;
        width: 0;
        transition: width 0.15s;
      }
      .compress-status {
        font-size: 10px;
        color: var(--red);
        font-weight: 700;
        margin-top: 3px;
      }

      .empty-state {
        text-align: center;
        padding: 40px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .empty-state .big-emoji {
        font-size: 48px;
      }
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- ═══════ PAGE: CATALOG ════════════════════════════ -->
    <div id="page-catalog" class="page active">
      <div class="hero" id="store-hero">
        <div class="hero-logo-wrap" id="hero-logo-wrap">🥟</div>
        <h1 class="hero-title" id="hero-title">Loading…</h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
      </div>
      <div class="search-wrap">
        <span class="s-icon"
          ><svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" /></svg
        ></span>
        <input id="search-input" type="search" placeholder="Cari menu…" />
      </div>
      <div class="cat-tabs-wrap" id="cat-tabs"></div>
      <div id="catalog-body" style="padding-bottom: 0"></div>
      <div class="sticky-cart hidden" id="sticky-cart">
        <button class="cart-btn" id="open-checkout" onclick="openCheckout()">
          <div class="cart-icon-wrap">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              width="22"
              height="22"
            >
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              />
            </svg>
            <span class="cart-badge" id="cart-badge">0</span>
          </div>
          <span class="cart-label">Lihat Keranjang</span>
          <span class="cart-total" id="cart-total-label">Rp 0</span>
        </button>
      </div>
    </div>

    <!-- ═══════ PAGE: LOGIN ══════════════════════════════ -->
    <div id="page-login" class="page">
      <div class="login-wrap">
        <div class="login-box">
          <div class="login-logo">
            <div class="emoji">⚙️</div>
            <h2>Admin Panel</h2>
          </div>
          <div class="form-group">
            <label class="form-label">Password Admin</label>
            <div class="pw-wrap">
              <span class="pw-icon"
                ><svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  width="16"
                  height="16"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg
              ></span>
              <input
                id="pw-input"
                type="password"
                class="form-input pw-input-field"
                placeholder="Masukkan password"
              />
              <button class="pw-toggle" id="pw-toggle" type="button">
                <svg
                  id="eye-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  width="16"
                  height="16"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <p class="login-err" id="login-err"></p>
          </div>
          <button class="btn-login" id="btn-login">Masuk</button>
        </div>
      </div>
    </div>

    <!-- ═══════ PAGE: ADMIN ══════════════════════════════ -->
    <div id="page-admin" class="page">
      <div class="admin-header">
        <div>
          <h2>Admin Panel ⚙️</h2>
          <p id="admin-stats">—</p>
        </div>
        <button class="icon-btn" id="btn-logout">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            width="18"
            height="18"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
      <div class="admin-body" id="admin-body"></div>
    </div>

    <!-- ═══════ CHECKOUT SHEET ═══════════════════════════ -->
    <div
      class="backdrop"
      id="backdrop"
      onclick="closeSheet('checkout-sheet','backdrop')"
    ></div>
    <div class="sheet" id="checkout-sheet">
      <div class="sheet-handle"><div class="handle"></div></div>
      <div class="sheet-header">
        <span class="sheet-title">Konfirmasi Pesanan</span>
        <button
          class="btn-close"
          onclick="closeSheet('checkout-sheet','backdrop')"
        >
          ✕
        </button>
      </div>
      <div class="sheet-body" id="sheet-body"></div>
    </div>

    <!-- ═══════ PRODUCT/CATEGORY FORM SHEET ══════════════ -->
    <div
      class="backdrop"
      id="form-backdrop"
      onclick="closeSheet('form-sheet','form-backdrop')"
    ></div>
    <div class="sheet" id="form-sheet">
      <div class="sheet-handle"><div class="handle"></div></div>
      <div class="sheet-header">
        <span class="sheet-title" id="form-sheet-title">Tambah Produk</span>
        <button
          class="btn-close"
          onclick="closeSheet('form-sheet','form-backdrop')"
        >
          ✕
        </button>
      </div>
      <div class="sheet-body" id="form-sheet-body"></div>
    </div>

      // Helper: fetch dari Supabase REST API
      async function sbFetch(table, options = {}) {
        const {
          method = 'GET',
          filter = '',
          body = null,
          select = '*',
        } = options;
        const url = `${SB_URL}/rest/v1/${table}?${
          select !== '*' ? 'select=' + select : 'select=*'
        }${filter ? '&' + filter : ''}`;
        const res = await fetch(url, {
          method,
          headers: {
            apikey: SB_KEY,
            Authorization: 'Bearer ' + SB_KEY,
            'Content-Type': 'application/json',
            Prefer:
              method === 'POST'
                ? 'return=representation'
                : 'return=representation',
          },
          body: body ? JSON.stringify(body) : null,
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Supabase error: ${res.status} ${err}`);
        }
        const text = await res.text();
        return text ? JSON.parse(text) : [];
      }

      async function sbInsert(table, data) {
        return sbFetch(table, { method: 'POST', body: data });

      async function sbUpdate(table, id, data) {
        return sbFetch(table, {
          method: 'PATCH',
          filter: `id=eq.${id}`,
          body: data,
        });
      }
      async function sbDelete(table, id) {
        return sbFetch(table, { method: 'DELETE', filter: `id=eq.${id}` });
      }
      async function sbSelect(table, filter = '') {
        return sbFetch(table, { filter });
      }

      // Upload gambar ke Supabase Storage
      async function uploadImage(base64DataUrl, folder = 'products') {
        if (!base64DataUrl || !base64DataUrl.startsWith('data:'))
          return base64DataUrl;
        const [meta, data] = base64DataUrl.split(',');
        const mime = meta.match(/data:(.*);/)[1];
        const ext = mime.split('/')[1] || 'jpg';
        const filename = `${folder}/${Date.now()}-${Math.random()
          .toString(36)
          .slice(2, 7)}.${ext}`;
        const bytes = atob(data);
        const arr = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
        const blob = new Blob([arr], { type: mime });
        const res = await fetch(
          `${SB_URL}/storage/v1/object/product-images/${filename}`,
          {
            method: 'POST',
            headers: {
              apikey: SB_KEY,
              Authorization: 'Bearer ' + SB_KEY,
              'Content-Type': mime,
              'x-upsert': 'true',
            },
            body: blob,
          }
        );
        if (!res.ok)
          throw new Error('Upload gambar gagal: ' + (await res.text()));
        return `${SB_URL}/storage/v1/object/public/product-images/${filename}`;
      }

        activeCat = 'all',
        editingId = null,
        editingCatId = null,
        prodImgData = '',
        logoImgData = '';

      const fmt = (n) => new Intl.NumberFormat('id-ID').format(n);
      const uid = () =>
        'x' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      const ep = (p) =>
        p.discount_price && p.discount_price < p.price
          ? p.discount_price
          : p.price;
      const sub = () =>
        Object.keys(cart).reduce((s, k) => {
          const p = products.find((x) => x.id === k);
          return p ? s + ep(p) * (cart[k] || 0) : s;
        }, 0);
      const tot = () => Object.values(cart).reduce((s, v) => s + v, 0);
      function emojiFor(id) {
        let h = 0;
        for (let i = 0; i < id.length; i++) {
          h = (h << 5) - h + id.charCodeAt(i);
          h |= 0;
        }
        return EMOJIS[Math.abs(h) % EMOJIS.length];
      }
      function sortedCats() {
        return [...categories].sort((a, b) => a.sort_order - b.sort_order);
      }
      function sortedProds(catId) {
        return [...products]
          .filter((p) => p.category_id === catId)
          .sort((a, b) => a.sort_order - b.sort_order);
      }

      /* ═══════════════════════════════════════════════════
   NAVIGATION & LOGIN
═══════════════════════════════════════════════════ */
      function showPage(name) {
        document
          .querySelectorAll('.page')
          .forEach((p) => p.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        document
          .querySelectorAll('.nav-tab')
          .forEach((t) => t.classList.remove('act'));
        const map = {
          catalog: 'nav-catalog',
          login: 'nav-admin',
          admin: 'nav-admin',
        };
        if (map[name]) document.getElementById(map[name]).classList.add('act');
        window.scrollTo(0, 0);
      }
      document.getElementById('nav-catalog').onclick = () =>
        showPage('catalog');
      document.getElementById('nav-admin').onclick = () => {
        sessionStorage.getItem('mq_auth') === '1'
          ? showPage('admin')
          : showPage('login');
      };

      let pwVis = false;
      document.getElementById('pw-toggle').onclick = function () {
        pwVis = !pwVis;
        document.getElementById('pw-input').type = pwVis ? 'text' : 'password';
        document.getElementById('eye-icon').innerHTML = pwVis
          ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      };
      function doLogin() {
        const v = document.getElementById('pw-input').value,
          eEl = document.getElementById('login-err');
        const currentPw = settings.admin_pw || 'admin123';
        if (v === currentPw) {
          sessionStorage.setItem('mq_auth', '1');
          document.getElementById('pw-input').value = '';
          eEl.textContent = '';
          showPage('admin');
          renderAdmin();
        } else {
          eEl.textContent = 'Password salah.';
          const inp = document.getElementById('pw-input');
          inp.classList.add('err');
          inp.style.animation = 'shake .4s ease';
          setTimeout(() => {
            inp.classList.remove('err');
            inp.style.animation = '';

      document.getElementById('btn-login').onclick = doLogin;
      document.getElementById('pw-input').onkeydown = (e) => {

      document.getElementById('btn-logout').onclick = () => {
        sessionStorage.removeItem('mq_auth');
        showPage('login');
      };

      /* ═══════════════════════════════════════════════════
   WELCOME POPUP
═══════════════════════════════════════════════════ */
      function checkWelcome() {
        if (!sessionStorage.getItem('mq_welcomed')) {
          document.getElementById('welcome-store-name').textContent =
            settings.main_title || 'Toko Kami';
          setTimeout(
            () =>
              document.getElementById('welcome-overlay').classList.add('show'),
            500
          );
        }
      }
      function closeWelcome() {
        document.getElementById('welcome-overlay').classList.remove('show');
        sessionStorage.setItem('mq_welcomed', '1');
      }

      /* ═══════════════════════════════════════════════════
   CATALOG RENDERING
═══════════════════════════════════════════════════ */
      let io = null;
      function initReveal() {
        if (io) io.disconnect();
        io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (!e.isIntersecting) return;
              const c = e.target,
                col = parseInt(c.dataset.col) || 0;
              setTimeout(() => c.classList.add('revealed'), col * 80);
              io.unobserve(c);
            });
          },
          { threshold: 0.1, rootMargin: '0px 0px -20px 0px' }
        );
      }

      function renderHero() {
        document.getElementById('hero-title').textContent =
          settings.main_title || 'E-Catalog';
        document.getElementById('hero-subtitle').textContent =
          settings.subtitle || '';
        const wrap = document.getElementById('hero-logo-wrap');
        wrap.innerHTML = settings.logo_url
          ? `<img src="${settings.logo_url}" alt="Logo">`
          : '🥟';
      }

      function renderTabs() {
        const wrap = document.getElementById('cat-tabs');
        wrap.innerHTML = [
          `<button class="cat-pill${
            activeCat === 'all' ? ' active' : ''
          }" onclick="setCat('all')">✨ Semua</button>`,
          ...sortedCats().map(
            (c) =>
              `<button class="cat-pill${
                activeCat === c.id ? ' active' : ''
              }" onclick="setCat('${c.id}')">${esc(c.name)}</button>`
          ),
        ].join('');
      }

      function setCat(id) {
        activeCat = id;
        renderTabs();
        if (id === 'all') {
          renderCatalog();
          return;
        }
        const body = document.getElementById('catalog-body');
        const cat = categories.find((c) => c.id === id);
        const catProds = sortedProds(id).filter((p) => p.is_available);
        body.innerHTML = `<div style="padding-bottom:140px">${
          catProds.length
            ? `<div class="cat-section"><p class="cat-section-title"><span>✨</span> ${esc(
                cat.name
              )}</p><div class="grid">${renderGridHTML(catProds)}</div></div>`
            : `<div class="empty-state"><span class="big-emoji">🥟</span><p>Belum ada produk</p></div>`
        }</div>`;
        initReveal();
        document.querySelectorAll('.card').forEach((c) => io.observe(c));
      }

      function renderCatalog(filter = '') {
        const body = document.getElementById('catalog-body'),
          cats = sortedCats(),
          searchMode = filter.trim() !== '';
        if (searchMode) {
          const filtered = products.filter(
            (p) =>
              p.is_available &&
              (p.name.toLowerCase().includes(filter.toLowerCase()) ||
                p.variant.toLowerCase().includes(filter.toLowerCase()))
          );
          body.innerHTML = `<div class="grid-all">${renderGridHTML(
            filtered
          )}</div>`;
        } else {
          let html = '<div style="padding-bottom:140px">';
          for (const cat of cats) {
            const catProds = sortedProds(cat.id).filter((p) => p.is_available);
            if (!catProds.length) continue;
            html += `<div class="cat-section" id="cat-sec-${
              cat.id
            }"><p class="cat-section-title"><span>✨</span> ${esc(
              cat.name
            )}</p><div class="grid">${renderGridHTML(catProds)}</div></div>`;
          }
          if (!products.filter((p) => p.is_available).length)
            html += `<div class="empty-state"><span class="big-emoji">🥟</span><p>Belum ada produk</p></div>`;
          html += '</div>';
          body.innerHTML = html;
        }
        initReveal();
        document.querySelectorAll('.card').forEach((c) => io.observe(c));
      }

      function renderGridHTML(prods) {
        return prods
          .map((p, i) => {
            const q = cart[p.id] || 0,
              hasP = p.discount_price && p.discount_price < p.price,
              img = p.image_url || '',
              col = p.is_featured ? 0 : i % 2;
            return `<div class="card${
              p.is_featured ? ' featured' : ''
            }" data-id="${p.id}" data-col="${col}">
      <div class="card-img">
        ${
          img
            ? `<img src="${img}" alt="${esc(
                p.name
              )}" onerror="this.style.display='none'">`
            : ``
        }
        <span class="emoji-fallback" style="${
          img ? 'display:none' : 'display:flex'
        }">${emojiFor(p.id)}</span>
        ${hasP ? `<span class="badge-promo">PROMO</span>` : ''}
        ${
          p.is_featured
            ? `<span class="badge-featured">⭐ Highlight</span>`
            : ''
        }
        ${p.variant ? `<span class="badge-var">${esc(p.variant)}</span>` : ''}
      </div>
      <div class="card-body">
        <p class="card-name">${esc(p.name)}</p>
        <div>
          ${hasP ? `<p class="price-original">Rp ${fmt(p.price)}</p>` : ''}
          <p class="price-main${hasP ? ' promo' : ''}">Rp ${fmt(ep(p))}</p>
        </div>
      </div>
      <div class="card-footer" id="cf-${p.id}">${cartCtrl(p.id, q)}</div>
    </div>`;
          })
          .join('');
      }

      function cartCtrl(id, q) {
        if (q === 0)
          return `<button class="btn-add" onclick="addCart('${id}')">Tambah</button>`;
        return `<div class="qty-controls"><button class="btn-qty btn-minus" onclick="rmCart('${id}')">−</button><span class="qty-num" id="qn-${id}">${q}</span><button class="btn-qty btn-plus" onclick="addCart('${id}')">+</button></div>`;
      }

      function addCart(id) {
        cart[id] = (cart[id] || 0) + 1;
        refreshFoot(id);
        updateCartBar();
        const qn = document.getElementById('qn-' + id);
        if (qn) {
          qn.classList.remove('bump');
          void qn.offsetWidth;
          qn.classList.add('bump');
        }
      }
      function rmCart(id) {
        if (!cart[id]) return;
        cart[id]--;
        if (cart[id] <= 0) delete cart[id];
        refreshFoot(id);
        updateCartBar();
      }
      function refreshFoot(id) {
        const el = document.getElementById('cf-' + id);
        if (el) el.innerHTML = cartCtrl(id, cart[id] || 0);
      }
      function updateCartBar() {
        const t = tot(),
          s = sub(),
          badge = document.getElementById('cart-badge'),
          sc = document.getElementById('sticky-cart');
        badge.textContent = t;
        badge.classList.remove('pop');
        void badge.offsetWidth;
        badge.classList.add('pop');
        document.getElementById('cart-total-label').textContent =
          'Rp ' + fmt(s);
        t > 0 ? sc.classList.remove('hidden') : sc.classList.add('hidden');
      }
      document.getElementById('search-input').oninput = function () {
        renderCatalog(this.value);
      };

      /* ═══════════════════════════════════════════════════
   CHECKOUT
═══════════════════════════════════════════════════ */
      function openCheckout() {
        const ids = Object.keys(cart).filter((k) => cart[k] > 0);
        if (!ids.length) return;
        const rows = ids
          .map((k) => {
            const p = products.find((x) => x.id === k),
              price = ep(p),
              img = p.image_url || '';
            return `<div class="order-item">
      <div class="order-thumb">${
        img ? `<img src="${img}" alt="">` : ''
      }<span style="${img ? 'display:none' : ''}">${emojiFor(p.id)}</span></div>
      <div class="order-info"><p class="order-name">${esc(
        p.name
      )}</p><p class="order-var">${esc(
              p.variant
            )}</p><p class="order-price" id="cop-${k}">Rp ${fmt(
              price * cart[k]
            )}</p></div>
      <div class="order-qty"><button class="oqbtn minus" onclick="coRm('${k}')">−</button><span class="oqnum" id="coq-${k}">${
              cart[k]
            }</span><button class="oqbtn plus" onclick="coAdd('${k}')">+</button></div>
    </div>`;
          })
          .join('');

        document.getElementById('sheet-body').innerHTML = `
    <div><p class="sec-label">Detail Pesanan</p><div class="order-card">${rows}</div>
    <div class="subtotal-row"><span class="subtotal-label">Subtotal</span><span class="subtotal-val" id="co-sub">Rp ${fmt(
      sub()
    )}</span></div></div>
    <div><p class="sec-label">Data Pemesan</p><div class="form-section">
      <div class="form-group"><label class="form-label">Nama Lengkap *</label><input id="co-name" class="form-input" type="text" placeholder="Contoh: Budi Santoso" autocomplete="name"><p class="err-msg" id="e-name"></p></div>
      <div class="form-group"><label class="form-label">Nomor WhatsApp *</label><div class="wa-row"><span class="wa-prefix">+62</span><input id="co-wa" class="form-input" type="tel" inputmode="numeric" placeholder="81234567890" style="flex:1"></div><p class="err-msg" id="e-wa"></p></div>
      <div class="form-group"><label class="form-label">Metode Pengambilan *</label><select id="co-method" class="form-input form-select" onchange="onDel(this.value)">${DELIVERY_METHODS.map(
        (d) => `<option value="${d.v}">${d.l}</option>`
      ).join('')}</select></div>
      <div id="co-ojol" class="hidden-field"><div class="info-box">Silakan pesan kurir sendiri setelah pesanan dikonfirmasi oleh admin ya! 🛵</div></div>
      <div id="co-addr-wrap" class="hidden-field"><div class="form-group"><label class="form-label">Alamat Lengkap *</label><textarea id="co-addr" class="form-input" rows="3" placeholder="Jl. Contoh No. 1…"></textarea><p class="err-msg" id="e-addr"></p></div></div>
      <div class="form-group"><label class="form-label">Catatan (opsional)</label><textarea id="co-notes" class="form-input" rows="2" placeholder="Tidak pedas, extra saus, dll."></textarea></div>
    </div></div>
    <button class="btn-wa" id="btn-wa-send">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
      Pesan via WhatsApp
    </button>`;
        document.getElementById('btn-wa-send').onclick = sendOrder;
        openSheet('checkout-sheet', 'backdrop');
      }

      function coAdd(id) {
        cart[id] = (cart[id] || 0) + 1;
        rCoItem(id);
        updateCartBar();
        refreshFoot(id);
      }
      function coRm(id) {
        if (!cart[id]) return;
        cart[id]--;
        if (cart[id] <= 0) {
          delete cart[id];
          refreshFoot(id);
          updateCartBar();
          closeSheet('checkout-sheet', 'backdrop');
          if (tot() > 0) setTimeout(openCheckout, 80);
          return;
        }
        rCoItem(id);
        updateCartBar();
        refreshFoot(id);
      }
      function rCoItem(id) {
        const qEl = document.getElementById('coq-' + id);
        if (qEl) qEl.textContent = cart[id] || 0;
        const p = products.find((x) => x.id === id);
        if (!p) return;
        const pEl = document.getElementById('cop-' + id);
        if (pEl) pEl.textContent = 'Rp ' + fmt(ep(p) * (cart[id] || 0));
        const sEl = document.getElementById('co-sub');
        if (sEl) sEl.textContent = 'Rp ' + fmt(sub());
      }
      function onDel(v) {
        const m = DELIVERY_METHODS.find((d) => d.v === v);
        document.getElementById('co-ojol').className = m.ojol
          ? ''
          : 'hidden-field';
        document.getElementById('co-addr-wrap').className = m.addr
          ? ''
          : 'hidden-field';
      }
      function sendOrder() {
        const name = (document.getElementById('co-name')?.value || '').trim();
        const wa = (document.getElementById('co-wa')?.value || '').replace(
          /\D/g,
          ''
        );
        const method = document.getElementById('co-method')?.value || 'pickup';
        const addr = (document.getElementById('co-addr')?.value || '').trim();
        const notes = (document.getElementById('co-notes')?.value || '').trim();
        const m = DELIVERY_METHODS.find((d) => d.v === method);
        let ok = true;
        ['e-name', 'e-wa', 'e-addr'].forEach((x) => {
          const e = document.getElementById(x);
          if (e) e.textContent = '';
        });
        if (!name) {
          document.getElementById('e-name').textContent = 'Nama wajib diisi.';
          ok = false;
        }
        if (!wa || wa.length < 8) {
          document.getElementById('e-wa').textContent = 'Nomor tidak valid.';
          ok = false;
        }
        if (m?.addr && !addr) {
          const e = document.getElementById('e-addr');
          if (e) e.textContent = 'Alamat wajib diisi.';
          ok = false;
        }
        if (!ok) return;

        const storeName = settings.main_title || 'Toko Kami';
        const lines = Object.keys(cart)
          .filter((k) => cart[k] > 0)
          .map((k) => {
            const p = products.find((x) => x.id === k);
            return `▫️ ${cart[k]}x ${p.name}${
              p.variant ? ' (' + p.variant + ')' : ''
            } - Rp ${fmt(ep(p) * cart[k])}`;
          })
          .join('\n');

          // Konstruksi baris demi baris teks WhatsApp
          let msgLines = [
            `Halo ${storeName}! 🥟✨`,
            `Saya mau order:`,
            ``,
            `🛒 *DETAIL PESANAN*`,
            lines,
            ``,
            `💰 *Subtotal:* Rp ${fmt(sub())}`,
            ``,
            `👤 *DATA PEMESAN*`,
            `▫️ *Nama:* ${name}`,
            `▫️ *WA.:* +62${wa}`, // ✅ SOLUSI NO. 1: Nomor WA Pemesan Tercantum Otomatis
            `▫️ *Pengambilan:* ${m?.s || method}`
          ];
  
          // Kondisi jika butuh alamat kirim
          if (m?.addr) {
            msgLines.push(`▫️ *Alamat Kirim:* ${addr}`);
          }
  
          msgLines.push(`▫️ *Catatan:* ${notes || '-'}`);
          msgLines.push(``);
  
          if (m?.v === 'ojol') {
            msgLines.push(`⚠️ Saya akan pesan kurir sendiri setelah pesanan dikonfirmasi.\n`);
          }
          msgLines.push(`Tolong dibantu cek ketersediaannya ya Kak. Terima kasih! 🙏`); 
          
          msgLines.push(``);

          // ✅ SOLUSI NO. 2: Koneksi Link Google Maps Masuk ke dalam Chat Owner
          if ((method === 'pickup' || method === 'ojol') && settings.gmaps_url) {
            msgLines.push(`*📍 Maps Lokasi Toko:* ${settings.gmaps_url}`);
          }
  
          // Gabungkan seluruh baris pesan
          const msg = msgLines.join('\n');

        const cleanWA = (settings.wa_number || '81234567890').replace(
          /^0|^62/,
          ''
        );
        window.open(
          `https://wa.me/62${cleanWA}?text=${encodeURIComponent(msg)}`,
          '_blank',
          'noopener,noreferrer'
        );
        cart = {};
        closeSheet('checkout-sheet', 'backdrop');
        renderCatalog(document.getElementById('search-input').value);
        updateCartBar();
      }

      /* ═══════════════════════════════════════════════════
   ADMIN — RENDER
═══════════════════════════════════════════════════ */

        const catsHTML = sortedCats()

            (c) => `

      )}</p></div>
      <div class="admin-row-actions">
        <button class="btn-sm btn-edit-sm" onclick="openCatForm('${
          c.id
        }')">✏️ Edit</button>
        <button class="btn-sm btn-del-sm"  onclick="delCat('${
          c.id
        }')">🗑</button>
      </div>
    </div>`
          )
          .join('');

        const prodsHTML = sortedCats()
          .map((cat) => {
            const catProds = sortedProds(cat.id);
            if (!catProds.length) return '';
            return `<div style="margin-bottom:12px">
      <p style="font-size:10px;font-weight:800;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;padding:4px 0 6px">${esc(
        cat.name
      )}</p>
      ${catProds
        .map(
          (p) => `
        <div class="admin-row" draggable="true" data-id="${
          p.id
        }" data-type="prod" data-cat="${
            cat.id
          }" ondragstart="dStart(event)" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event)">
          <div class="drag-handle">☰</div>
          <div class="admin-thumb" style="width:40px;height:40px;font-size:16px">${
            p.image_url ? `<img src="${p.image_url}" alt="">` : emojiFor(p.id)
          }</div>
          <div class="admin-row-info">
            <p class="admin-row-name">${esc(p.name)} ${
            p.is_featured ? '⭐' : ''
          }</p>
            <p style="font-size:11px;color:var(--red);font-weight:700">Rp ${fmt(
              ep(p)
            )}</p>
          </div>
          <div class="admin-row-actions">
            <label class="toggle-wrap"><input type="checkbox" ${
              p.is_available ? 'checked' : ''
            } onchange="toggleProd('${
            p.id
          }')"><span class="toggle-slider"></span></label>
            <button class="btn-sm btn-edit-sm" onclick="openProdForm('${

            }')">✏️</button>
            <button class="btn-sm btn-del-sm"  onclick="delProd('${

            }')">🗑</button>
          </div>
        </div>`

        .join('')}
    </div>`;
          })
          .join('');

        body.innerHTML =
          settingsHTML +
          `<div class="admin-section"><p class="admin-section-title"><span>📂</span> Kategori Menu</p>${
            catsHTML ||
            '<p style="font-size:12px;color:#bbb;text-align:center;padding:8px">Belum ada kategori</p>'
          }<button class="btn-add-new" onclick="openCatForm(null)">+ Tambah Kategori</button></div>` +
          `<div class="admin-section"><p class="admin-section-title"><span>🥟</span> Daftar Produk</p>${
            prodsHTML ||
            '<p style="font-size:12px;color:#bbb;text-align:center;padding:8px">Belum ada produk</p>'

          `<div class="admin-footer-actions">
        <button class="btn-danger-outline" onclick="resetData()">⚠️ Reset Data</button>
        <button class="btn-save" onclick="saveSettings_()">💾 Simpan</button>

      }

      async function saveSettings_() {
        const title = (document.getElementById('st-title')?.value || '').trim();
        const sub2 = (document.getElementById('st-sub')?.value || '').trim();
        const wa = (document.getElementById('st-wa')?.value || '').replace(
          /\D/g,
          ''
        );
        const pw = (document.getElementById('st-pw')?.value || '').trim();
        const gmaps = (document.getElementById('st-gmaps')?.value || '').trim();
        if (!title || !wa || !pw) {
          alert('Pastikan Nama Toko, Nomor WA, dan Password sudah diisi.');
          return;
        }

        // Upload logo kalau ada gambar baru
        if (logoImgData) {
          try {
            settings.logo_url = await uploadImage(logoImgData, 'logos');
          } catch (e) {
            console.error('Logo upload error:', e);
          }
        }

        settings.main_title = title;
        settings.subtitle = sub2;
        settings.wa_number = wa;
        settings.admin_pw = pw;
        settings.gmaps_url = gmaps;
        try {
          await saveSettings();
          renderHero();

          alert('Gagal simpan: ' + e.message);
        }

      /* ═══════════════════════════════════════════════════
   DRAG AND DROP
═══════════════════════════════════════════════════ */
      let dSource = null;
      function dStart(e) {
        dSource = e.currentTarget;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => dSource.classList.add('dragging'), 0);
      }
      function dOver(e) {
        e.preventDefault();
        const target = e.currentTarget;
        if (target === dSource || target.dataset.type !== dSource.dataset.type)
          return;
        if (
          target.dataset.type === 'prod' &&
          target.dataset.cat !== dSource.dataset.cat
        )
          return;
        const mid =
          target.getBoundingClientRect().y +
          target.getBoundingClientRect().height / 2;
        if (e.clientY - mid > 0) {
          target.classList.add('drag-over-bottom');
          target.classList.remove('drag-over-top');
        } else {
          target.classList.add('drag-over-top');
          target.classList.remove('drag-over-bottom');
        }
      }
      function dLeave(e) {
        e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');
      }
      function dDrop(e) {
        e.preventDefault();
        const target = e.currentTarget;
        target.classList.remove('drag-over-top', 'drag-over-bottom');
        if (dSource) dSource.classList.remove('dragging');
        if (target === dSource || target.dataset.type !== dSource.dataset.type)
          return;
        if (
          target.dataset.type === 'prod' &&
          target.dataset.cat !== dSource.dataset.cat
        )
          return;
        const mid =
          target.getBoundingClientRect().y +
          target.getBoundingClientRect().height / 2;
        if (e.clientY - mid > 0) target.after(dSource);
        else target.before(dSource);
        updateDOMOrder(dSource.dataset.type, dSource.dataset.cat);
      }
      async function updateDOMOrder(type, catId) {
        if (type === 'cat') {
          document
            .querySelectorAll('.admin-row[data-type="cat"]')
            .forEach(async (row, i) => {
              const o = categories.find((c) => c.id === row.dataset.id);
              if (o) {
                o.sort_order = i + 1;
                await sbUpdate('categories', o.id, { sort_order: i + 1 });
              }
            });
        } else {
          document
            .querySelectorAll(
              `.admin-row[data-type="prod"][data-cat="${catId}"]`
            )
            .forEach(async (row, i) => {
              const o = products.find((p) => p.id === row.dataset.id);
              if (o) {
                o.sort_order = i + 1;
                await sbUpdate('products', o.id, { sort_order: i + 1 });
              }
            });
        }
        renderCatalog();
        renderTabs();
      }

      /* ═══════════════════════════════════════════════════
   CATEGORY FORM
═══════════════════════════════════════════════════ */
      function openCatForm(id) {
        editingCatId = id;
        const cat = id ? categories.find((c) => c.id === id) : null;
        document.getElementById('form-sheet-title').textContent = cat
          ? 'Edit Kategori'
          : 'Tambah Kategori';
        document.getElementById('form-sheet-body').innerHTML = `
    <div class="form-section">
      <div class="form-group"><label class="form-label">Nama Kategori *</label><input id="catf-name" class="form-input" type="text" value="${esc(
        cat?.name || ''
      )}" placeholder="Contoh: Main Menu"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeSheet('form-sheet','form-backdrop')">Batal</button>
        <button class="btn-save"   onclick="saveCatForm()">💾 Simpan</button>
      </div>
    </div>`;
        openSheet('form-sheet', 'form-backdrop');
      }
      async function saveCatForm() {
        const name = (document.getElementById('catf-name')?.value || '').trim();
        if (!name) return;
        if (editingCatId) {
          const c = categories.find((x) => x.id === editingCatId);
          if (c) {
            c.name = name;
            await saveCat(c);
          }
        } else {
          const newCat = {
            id: '',
            name,
            sort_order:
              categories.reduce((m, c) => Math.max(m, c.sort_order), 0) + 1,
          };
          await saveCat(newCat, true);
          categories.push(newCat);
        }
        closeSheet('form-sheet', 'form-backdrop');
        renderAdmin();
        renderCatalog();
        renderTabs();
      }
      async function delCat(id) {
        if (!confirm('Hapus kategori ini?')) return;
        await deleteCat(id);
        categories = categories.filter((c) => c.id !== id);
        renderAdmin();
        renderCatalog();
        renderTabs();
      }

      /* ═══════════════════════════════════════════════════
   PRODUCT FORM
═══════════════════════════════════════════════════ */
      function openProdForm(id) {
        editingId = id;
        const p = id ? products.find((x) => x.id === id) : null;
        prodImgData = p?.image_url || '';
        document.getElementById('form-sheet-title').textContent = p
          ? 'Edit Produk'
          : 'Tambah Produk';
        document.getElementById('form-sheet-body').innerHTML = `
    <div class="form-section">
      <div class="form-group"><label class="form-label">Foto Produk${
        !p ? ' *' : ''
      }</label>${imgZoneHTML('prod-img', prodImgData, 'prod')}</div>
      <div class="form-group"><label class="form-label">Nama Produk *</label><input id="fp-name" class="form-input" type="text" value="${esc(
        p?.name || ''
      )}" placeholder="Nama produk"></div>
      <div class="form-group"><label class="form-label">Kategori *</label>
        <select id="fp-cat" class="form-input form-select">${sortedCats()
          .map(
            (c) =>
              `<option value="${c.id}"${
                p?.category_id === c.id ? ' selected' : ''
              }>${esc(c.name)}</option>`
          )
          .join('')}</select>
      </div>
      <div style="display:flex;gap:10px">
        <div class="form-group" style="flex:1"><label class="form-label">Harga (Rp) *</label><input id="fp-price" class="form-input" type="number" value="${
          p?.price || ''
        }" placeholder="35000"></div>
        <div class="form-group" style="flex:1"><label class="form-label">Harga Promo (Rp)</label><input id="fp-promo" class="form-input" type="number" value="${
          p?.discount_price || ''
        }" placeholder="Opsional"></div>
      </div>
      <div class="form-group"><label class="form-label">Varian</label><input id="fp-variant" class="form-input" type="text" value="${esc(
        p?.variant || ''
      )}" placeholder="Contoh: Isi 3, Isi 6"></div>
      <div style="display:flex;justify-content:space-between;padding:10px 0"><span style="font-size:13px;font-weight:600">Tersedia di katalog</span><label class="toggle-wrap"><input id="fp-avail" type="checkbox" ${
        !p || p.is_available ? 'checked' : ''
      }><span class="toggle-slider"></span></label></div>
      <div style="display:flex;justify-content:space-between;padding:10px 0"><span style="font-size:13px;font-weight:600">⭐ Tampil 1 Baris Penuh</span><label class="toggle-wrap"><input id="fp-featured" type="checkbox" ${
        p?.is_featured ? 'checked' : ''
      }><span class="toggle-slider"></span></label></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeSheet('form-sheet','form-backdrop')">Batal</button>
        <button class="btn-save"   onclick="saveProdForm()">💾 Simpan</button>
      </div>
    </div>`;
        openSheet('form-sheet', 'form-backdrop');
      }
      async function saveProdForm() {
        const name = (document.getElementById('fp-name')?.value || '').trim();
        const price = parseInt(document.getElementById('fp-price')?.value) || 0;
        const promo =
          parseInt(document.getElementById('fp-promo')?.value) || null;
        const variant = (
          document.getElementById('fp-variant')?.value || ''
        ).trim();
        const catId = document.getElementById('fp-cat')?.value || '';
        const avail = document.getElementById('fp-avail')?.checked;
        const featured = document.getElementById('fp-featured')?.checked;
        if (!name || !price) {
          alert('Nama dan Harga produk wajib diisi.');
          return;
        }

        // Disable tombol simpan sementara upload
        const btn = document.querySelector('.btn-save');
        if (btn) {
          btn.textContent = '⏳ Menyimpan...';
          btn.disabled = true;
        }

        try {
          if (editingId) {
            const p = products.find((x) => x.id === editingId);
            if (p) {
              Object.assign(p, {
                name,
                price,
                discount_price: promo && promo > 0 ? promo : null,
                variant,
                category_id: catId,
                is_available: avail,
                is_featured: featured,
                image_url: prodImgData || p.image_url,
              });
              await saveProd(p, false);
            }
          } else {
            const newProd = {
              id: '',
              name,
              price,
              discount_price: promo && promo > 0 ? promo : null,
              variant,
              category_id: catId,
              image_url: prodImgData,
              is_available: avail,
              is_featured: featured,
              sort_order:
                products
                  .filter((x) => x.category_id === catId)
                  .reduce((m, x) => Math.max(m, x.sort_order), 0) + 1,
            };
            await saveProd(newProd, true);
            products.unshift(newProd);
          }
          closeSheet('form-sheet', 'form-backdrop');
          renderAdmin();
          renderCatalog();
        } catch (e) {
          alert('Gagal menyimpan: ' + e.message);
          if (btn) {
            btn.textContent = '💾 Simpan';
            btn.disabled = false;
          }
        }
      }
      async function toggleProd(id) {
        const p = products.find((x) => x.id === id);
        if (!p) return;
        p.is_available = !p.is_available;
        await sbUpdate('products', id, { is_available: p.is_available });
        renderAdmin();
        renderCatalog();
      }
      async function delProd(id) {
        if (!confirm('Hapus produk ini?')) return;
        await deleteProd(id);
        products = products.filter((x) => x.id !== id);
        renderAdmin();
        renderCatalog();
      }
      async function resetData() {
        if (
          !confirm(
            '🚨 PERINGATAN!\n\nHapus SEMUA produk, kategori, dan pengaturan?\n\nTidak bisa dibatalkan!'
          )
        )
          return;
        try {
          // Hapus semua produk dan kategori dari Supabase
          await sbFetch('products', {
            method: 'DELETE',
            filter: 'id=neq.00000000-0000-0000-0000-000000000000',
          });
          await sbFetch('categories', {
            method: 'DELETE',
            filter: 'id=neq.00000000-0000-0000-0000-000000000000',
          });
          alert('Berhasil! Data telah di-reset.');
          location.reload();
        } catch (e) {
          alert('Gagal reset: ' + e.message);
        }
      }

      /* ═══════════════════════════════════════════════════
   IMAGE UPLOAD ZONE
═══════════════════════════════════════════════════ */
      function imgZoneHTML(zoneId, currentImg, type) {
        return `<div class="img-zone${
          currentImg ? ' has-img' : ''
        }" id="${zoneId}" onclick="document.getElementById('${zoneId}-file').click()" role="button" tabindex="0">
    <img id="${zoneId}-prev" class="img-zone-preview${
          currentImg ? ' on' : ''
        }" src="${currentImg || ''}" alt="Preview">
    <div class="img-zone-placeholder" id="${zoneId}-ph" style="${
          currentImg ? 'display:none' : ''
        }">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <strong>Tap untuk pilih foto</strong><span>JPG · PNG · HEIC</span>
    </div>
    <div class="img-zone-overlay">Ganti Foto</div>
    <button class="img-remove" onclick="removeZoneImg(event,'${zoneId}','${type}')">✕</button>
  </div>
  <input id="${zoneId}-file" type="file" accept="image/*" style="display:none" onchange="onZoneFilePick(this,'${zoneId}','${type}')">
  <div class="compress-progress" id="${zoneId}-prog"><div class="compress-track"><div class="compress-fill" id="${zoneId}-fill"></div></div><p class="compress-status" id="${zoneId}-status">Mengompresi…</p></div>`;
      }

      function compressImg(file, maxKB = 280, maxDim = 900) {
        return new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              let w = img.width,
                h = img.height;
              if (w > maxDim || h > maxDim) {
                if (w > h) {
                  h = Math.round((h * maxDim) / w);
                  w = maxDim;
                } else {
                  w = Math.round((w * maxDim) / h);
                  h = maxDim;
                }
              }
              const c = document.createElement('canvas');
              c.width = w;
              c.height = h;
              c.getContext('2d').drawImage(img, 0, 0, w, h);
              let q = 0.82,
                dataUrl = c.toDataURL('image/jpeg', q);
              while (dataUrl.length > maxKB * 1024 * 1.37 && q > 0.18) {
                q -= 0.06;
                dataUrl = c.toDataURL('image/jpeg', q);
              }
              res(dataUrl);
            };
            img.onerror = rej;
            img.src = e.target.result;
          };
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });
      }

      async function onZoneFilePick(input, zoneId, type) {
        const file = input.files?.[0];
        if (!file) return;
        if (file.size > 15 * 1024 * 1024) {
          alert('File terlalu besar. Maks. 15MB.');
          return;
        }
        const prog = document.getElementById(zoneId + '-prog'),
          fill = document.getElementById(zoneId + '-fill'),
          lbl = document.getElementById(zoneId + '-status');
        if (prog) prog.classList.add('on');
        let pct = 0;
        const ticker = setInterval(() => {
          pct = Math.min(pct + 7, 88);
          if (fill) fill.style.width = pct + '%';
          if (lbl) lbl.textContent = `Mengompresi… ${Math.round(pct)}%`;
        }, 80);
        try {
          const result = await compressImg(file, 280, 900);
          clearInterval(ticker);
          if (fill) fill.style.width = '100%';
          if (lbl) lbl.textContent = '✅ Selesai!';
          setTimeout(() => {
            if (prog) prog.classList.remove('on');
            if (fill) fill.style.width = '0';
          }, 1500);
          if (type === 'logo') logoImgData = result;
          else prodImgData = result;
          const prev = document.getElementById(zoneId + '-prev'),
            zone = document.getElementById(zoneId),
            ph = document.getElementById(zoneId + '-ph');
          if (prev) {
            prev.src = result;
            prev.classList.add('on');
          }
          if (zone) zone.classList.add('has-img');
          if (ph) ph.style.display = 'none';
        } catch (err) {
          clearInterval(ticker);
          if (prog) prog.classList.remove('on');
          alert('Gagal memproses gambar. Coba lagi.');
        }
        input.value = '';
      }

      function removeZoneImg(e, zoneId, type) {
        e.stopPropagation();
        if (type === 'logo') logoImgData = '';
        else prodImgData = '';
        const prev = document.getElementById(zoneId + '-prev'),
          zone = document.getElementById(zoneId),
          ph = document.getElementById(zoneId + '-ph');
        if (prev) {
          prev.src = '';
          prev.classList.remove('on');
        }
        if (zone) zone.classList.remove('has-img');
        if (ph) ph.style.display = '';
      }

      /* ═══════════════════════════════════════════════════
   SHEET HELPERS & UTILS
═══════════════════════════════════════════════════ */
      function openSheet(s, b) {
        document.getElementById(b).classList.add('show');
        document.getElementById(s).classList.add('show');
        document.body.style.overflow = 'hidden';
      }
      function closeSheet(s, b) {
        document.getElementById(b).classList.remove('show');
        document.getElementById(s).classList.remove('show');
        document.body.style.overflow = '';
      }
      function esc(s) {
        return (s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ═══════════════════════════════════════════════════
   INIT — Load Supabase dulu, baru render
═══════════════════════════════════════════════════ */
      // Tampilkan loading sementara Supabase load
      document.getElementById('hero-title').textContent = 'Loading…';

      loadAllData().then(() => {
        renderHero();
        renderTabs();
        renderCatalog();
        updateCartBar();
        checkWelcome();
        if (sessionStorage.getItem('mq_auth') === '1') renderAdmin();
      });
    </script>
  </body>
